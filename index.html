<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00}
.withdraw{background:#28a745;color:white}

.dashboard{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div style="padding:20px;text-align:center;background:white;">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<p id="user"></p>
</div>

<header>
<h1>BuildRun</h1>
<p>Step 4 - Real Invest</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>

<hr>

<h3>Investment History</h3>
<div id="history"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

// ===== SUPABASE =====
const supabase = window.supabase.createClient(
"https://xtqhhozntvdmzcywkpbu.supabase.co",
"sb_publishable_bx3hIxUKdAYg9Le-ifq8og_iKI6DyEt"
);

let currentUser = null;
let balance = 0;

// ===== MACHINES =====
const machines = [
{name:"Mini Excavator",price:5000},
{name:"Loader",price:8000},
{name:"Bulldozer",price:20000},
{name:"Backhoe",price:25000},
{name:"Crane",price:100000},
{name:"Truck",price:120000},
{name:"Excavator",price:300000}
];

const container = document.getElementById("machines");

machines.forEach(function(m){

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">Invest</button>
<button class="momo">MTN / Orange</button>
`;

container.appendChild(div);

});

// ===== AUTH =====
window.signUp = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { error } = await supabase.auth.signUp({email,password});

if(error) alert(error.message);
else alert("Account created");

}

window.signIn = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signInWithPassword({email,password});

if(error){
alert(error.message);
}else{
currentUser = data.user;
document.getElementById("user").innerText = "Logged: " + data.user.email;
loadInvestments();
}
}

// ===== INVEST REAL =====
window.invest = async function(name, amount){

if(!currentUser){
alert("Login first");
return;
}

let months = parseInt(prompt("Duration (2-12 months)"));
if(!months || months<2 || months>12) return;

let total = amount * 1.8;
let daily = Math.floor(total/(months*30));

// SAVE TO SUPABASE
await supabase.from("investments").insert([{
user_email: currentUser.email,
machine: name,
amount: amount,
months: months,
daily_income: daily,
total_return: total
}]);

alert("Investment saved");

loadInvestments();

}

// ===== LOAD HISTORY =====
async function loadInvestments(){

const { data, error } = await supabase
.from("investments")
.select("*")
.eq("user_email", currentUser.email);

if(error){
console.log(error);
return;
}

let html = "";
balance = 0;

data.forEach(i=>{
balance += i.daily_income;

html += `
<div style="background:#f9f9f9;padding:10px;margin-top:5px;">
${i.machine} - ${i.amount} FCFA - ${i.months} months
</div>
`;
});

document.getElementById("history").innerHTML = html;
document.getElementById("balance").innerText = "Balance: " + balance + " FCFA";

}

});

</script>

</body>
</html>
