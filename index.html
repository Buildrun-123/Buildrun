<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.paypal.com/sdk/js?client-id=AXzJSzlBTtK0dHLQgK95sIFrQKbxz31Rof3fmtrTa6WtOujg61oZduwAR9WaOf5c5L6nTW7SDoHI5QSF"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#0a2540;color:white;padding:20px;text-align:center}
.container{padding:20px}
.machine{background:white;margin:15px;padding:15px;border-radius:10px}
.machine img{width:100%;border-radius:10px}
button{padding:10px;margin-top:10px}
.dashboard{background:white;padding:20px;margin-top:20px;border-radius:10px}
</style>
</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Invest in Machines</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>
</div>

<script>

// ===== SAFE START =====
window.onload = function(){

// ===== SUPABASE SAFE INIT =====
let supabase = null;

try {
supabase = window.supabase.createClient(
"https://xtqhhozntvdmzcywkpbu.supabase.co",
"sb_publishable_bx3hIxUKdAYg9Le-ifq8og_iKI6DyEt"
);
} catch(e){
console.log("Supabase not loaded, continue without DB");
}

// ===== MACHINES =====
const machines = [

{
name:"Mini Excavator",
price:5000,
img:"https://cdn.pixabay.com/photo/2016/11/29/03/53/excavator-1867268_1280.jpg"
},

{
name:"Small Loader",
price:8000,
img:"https://cdn.pixabay.com/photo/2017/01/06/19/15/loader-1958223_1280.jpg"
},

{
name:"Bulldozer",
price:20000,
img:"https://cdn.pixabay.com/photo/2014/12/21/23/39/bulldozer-575706_1280.jpg"
},

{
name:"Backhoe Loader",
price:25000,
img:"https://cdn.pixabay.com/photo/2016/03/27/07/08/backhoe-1284418_1280.jpg"
},

{
name:"Tower Crane",
price:100000,
img:"https://cdn.pixabay.com/photo/2016/11/29/09/32/crane-1869733_1280.jpg"
},

{
name:"Dump Truck",
price:120000,
img:"https://cdn.pixabay.com/photo/2017/08/01/09/04/dump-truck-2561693_1280.jpg"
},

{
name:"Heavy Excavator",
price:300000,
img:"https://cdn.pixabay.com/photo/2018/05/03/11/20/excavator-3371771_1280.jpg"
}

];

let balance = 0;

// ===== DISPLAY =====
const container = document.getElementById("machines");

machines.forEach(m=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button onclick="invest('${m.name}',${m.price})">
Invest
</button>

<button onclick="mobile(${m.price})">
Mobile Money
</button>

<div id="paypal-${m.name}"></div>
`;

container.appendChild(div);

// PAYPAL
paypal.Buttons({
createOrder: (data, actions)=>{
return actions.order.create({
purchase_units:[{
amount:{value:(m.price/600).toFixed(2)}
}]
});
},
onApprove: (data, actions)=>{
return actions.order.capture().then(()=>{
invest(m.name,m.price);
});
}
}).render(`#paypal-${m.name}`);

});

// ===== INVEST =====
window.invest = function(name, amount){
balance += amount;

document.getElementById("balance").innerText =
"Balance: "+balance+" FCFA";

// SAVE ONLY IF SUPABASE OK
if(supabase){
supabase.from("investments").insert([{
user_email:"user@test.com",
machine:name,
months:2,
daily_income:100,
total_return:200,
earned:0
}]);
}

alert("Investment successful");
}

// ===== MOBILE MONEY =====
window.mobile = function(amount){
alert("Send "+amount+" FCFA to MTN: 683397310");
}

}

</script>

</body>
</html>
