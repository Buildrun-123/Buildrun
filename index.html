<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
cursor:pointer;
}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00}
.withdraw{background:#28a745;color:white}

.dashboard{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div style="padding:20px;text-align:center;background:white;">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<p id="user"></p>
</div>

<header>
<h1>BuildRun</h1>
<p>Construction Investment Platform</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>

<button class="withdraw" onclick="withdraw()">Withdraw</button>

<hr>

<h3>Investment History</h3>
<div id="history"></div>

<hr>

<h3>Withdrawals</h3>
<div id="withdrawals"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

// ================= SUPABASE =================
const supabase = window.supabase.createClient(
"https://fngbqwsnnyyftgapkqq.supabase.co",
"sb_publishable_Hig7R08xbzIPDgXGeNJzXg_xFtONv7V"
);

let currentUser = null;
let balance = 0;

// ================= MACHINES =================
const machines = [
{name:"Mini Excavator",price:5000},
{name:"Loader",price:8000},
{name:"Bulldozer",price:20000},
{name:"Backhoe",price:25000},
{name:"Crane",price:100000},
{name:"Truck",price:120000},
{name:"Excavator",price:300000}
];

const container = document.getElementById("machines");

machines.forEach(m=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">Invest</button>
<button class="momo" onclick="momo(${m.price})">MTN / Orange</button>
`;

container.appendChild(div);

});

// ================= AUTH =================
window.signUp = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { error } = await supabase.auth.signUp({email,password});

if(error) alert(error.message);
else alert("Account created successfully");

}

window.signIn = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signInWithPassword({email,password});

if(error){
alert(error.message);
}else{
currentUser = data.user;
document.getElementById("user").innerText = "Logged: " + currentUser.email;
loadData();
}

}

// ================= INVEST =================
window.invest = async function(name,amount){

if(!currentUser){
alert("Login first");
return;
}

let months = parseInt(prompt("Duration (2-12 months)"));
if(!months || months<2 || months>12) return;

let total = amount * 1.8;
let daily = Math.floor(total/(months*30));

await supabase.from("investments").insert([{
user_email: currentUser.email,
machine: name,
amount: amount,
months: months,
daily_income: daily,
total_return: total
}]);

loadData();

}

// ================= WITHDRAW =================
window.withdraw = async function(){

if(!currentUser){
alert("Login first");
return;
}

let amount = parseInt(prompt("Amount"));

if(amount < 1000 || amount > balance){
alert("Invalid amount");
return;
}

let method = prompt("MTN / Orange / PayPal");

await supabase.from("withdrawals").insert([{
user_email: currentUser.email,
amount: amount,
method: method,
status: "pending"
}]);

loadData();

}

// ================= LOAD DATA =================
async function loadData(){

// INVESTMENTS
const { data: inv } = await supabase
.from("investments")
.select("*")
.eq("user_email", currentUser.email);

let html="";
balance = 0;

inv.forEach(i=>{
balance += i.daily_income;
html += `<div>${i.machine} - ${i.amount} FCFA</div>`;
});

document.getElementById("history").innerHTML = html;
document.getElementById("balance").innerText = "Balance: "+balance+" FCFA";

// WITHDRAWALS
const { data: w } = await supabase
.from("withdrawals")
.select("*")
.eq("user_email", currentUser.email);

let whtml="";

w.forEach(x=>{
whtml += `<div>${x.amount} FCFA - ${x.method} - ${x.status}</div>`;
});

document.getElementById("withdrawals").innerHTML = whtml;

}

// ================= MOMO =================
window.momo = function(amount){
alert("Send "+amount+" FCFA to:\nMTN: 683397310\nOrange: 688529699");
}

});

</script>

</body>
</html>
