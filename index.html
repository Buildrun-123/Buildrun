<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST</title>
</head>

<body>

<h1>TEST MACHINES</h1>

<div id="machines"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const machines = [
{name:"Mini Excavator",price:5000},
{name:"Loader",price:8000},
{name:"Bulldozer",price:20000}
];

const container = document.getElementById("machines");

machines.forEach(function(m){

let div = document.createElement("div");

div.innerHTML = m.name + " - " + m.price + " FCFA";

container.appendChild(div);

});

});

</script>

</body>
</html>
