<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#0a2540;color:white;padding:20px;text-align:center}
.container{padding:20px}
.machine{background:white;margin:15px;padding:15px;border-radius:10px}
.machine img{width:100%;height:200px;object-fit:cover;border-radius:10px}
button{padding:10px;margin-top:10px;width:100%}
.dashboard{background:white;padding:20px;margin:20px;border-radius:10px}
</style>

</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Invest Platform</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>
<button onclick="withdraw()">Withdraw</button>
</div>

<script>

// SAFE START
window.onload = function(){

let balance = 0;

// MACHINES (LOCAL IMAGES)
const machines = [
{name:"Mini Excavator",price:5000,img:"mini.jpg"},
{name:"Loader",price:8000,img:"loader.jpg"},
{name:"Bulldozer",price:20000,img:"bulldozer.jpg"},
{name:"Backhoe",price:25000,img:"backhoe.jpg"},
{name:"Crane",price:100000,img:"crane.jpg"},
{name:"Truck",price:120000,img:"truck.jpg"},
{name:"Excavator",price:300000,img:"excavator.jpg"}
];

const container = document.getElementById("machines");

// DISPLAY MACHINES
machines.forEach(m=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button onclick="invest('${m.name}',${m.price})">
Invest
</button>

<button onclick="momo(${m.price})">
MTN / Orange
</button>
`;

container.appendChild(div);

});

// INVEST
window.invest = function(name, amount){

let months = prompt("Duration (2-12)");
months = parseInt(months);

if(!months || months < 2 || months > 12){
alert("Invalid");
return;
}

let base = amount * 1.8;
let extra = (months-2)*0.1;
let total = base + (base * extra);

let daily = Math.floor(total/(months*30));

balance += daily;

document.getElementById("balance").innerText =
"Balance: "+balance+" FCFA";

alert(
"Machine: "+name+
"\nTotal: "+Math.floor(total)+
"\nDaily: "+daily
);

}

// WITHDRAW
window.withdraw = function(){

let amount = prompt("Amount");

if(amount < 1000){
alert("Min 1000");
return;
}

if(amount > balance){
alert("Not enough");
return;
}

balance -= amount;

document.getElementById("balance").innerText =
"Balance: "+balance+" FCFA";

alert("Withdrawal sent");

}

// MOMO
window.momo = function(amount){
alert("Send "+amount+" FCFA\nMTN: 683397310\nOrange: 688529699");
}

}

</script>

</body>
</html>
