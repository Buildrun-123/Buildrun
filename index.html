<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=AXzJSzlBTtK0dHLQgK95sIFrQKbxz31Rof3fmtrTa6WtOujg61oZduwAR9WaOf5c5L6nTW7SDoHI5QSF&currency=USD"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.machine img{
width:100%;
height:600px;
object-fit:cover;
border-radius:10px;
}

button{
padding:12px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

/* COLORS */
.invest{background:#0a2540;color:white}
.momo{background:#ffcc00;color:black}
.withdraw{background:#28a745;color:white}

/* DASHBOARD */
.dashboard{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}
  
hr{
margin:15px 0;
}

ul{
padding-left:20px;
color:#444;
}
</style>
</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Invest in Construction Machines</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>

<button class="withdraw" onclick="withdraw()">
Withdraw Money
</button>

<hr>
  
<p style="margin-top:10px;color:gray;">
<h3>Rules</h3>
<ul>
Minimum withdrawal: 1000 FCFA<br>
Maximum withdrawal: 500000 FCFA<br>
Processing time: 1 - 3 days
</ul>
</p>
</div>
  
<hr>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];
let balance = parseInt(localStorage.getItem("balance")) || 0;

// MACHINES (LOCAL IMAGES)
const machines = [
{name:"Mini Excavator",price:5000,img:"mini.jpg"},
{name:"Loader",price:8000,img:"loader.jpg"},
{name:"Bulldozer",price:20000,img:"bulldozer.jpg"},
{name:"Backhoe",price:25000,img:"backhoe.jpg"},
{name:"Crane",price:100000,img:"crane.jpg"},
{name:"Truck",price:120000,img:"truck.jpg"},
{name:"Excavator",price:300000,img:"excavator.jpg"}
];

const container = document.getElementById("machines");

machines.forEach((m,index)=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">
Invest
</button>

<button class="momo" onclick="momo(${m.price})">
Pay with MTN / Orange
</button>

<div id="paypal-${index}" style="margin-top:10px;"></div>
`;

container.appendChild(div);

// PAYPAL BUTTON (SAFE)
try{
paypal.Buttons({
createOrder: function(data, actions){
return actions.order.create({
purchase_units:[{
amount:{value:(m.price/600).toFixed(2)}
}]
});
},
onApprove: function(data, actions){
return actions.order.capture().then(function(){
invest(m.name,m.price);
});
}
}).render(`#paypal-${index}`);
}catch(e){
console.log("PayPal error");
}

});

// INVEST
function invest(name, amount){

let months = prompt("Duration (2-12 months)");
months = parseInt(months);

if(!months || months < 2 || months > 12){
alert("Invalid duration");
return;
}

// CALCUL
let base = amount * 1.8;
let extra = (months - 2) * 0.1;
let total = base + (base * extra);

let daily = Math.floor(total / (months * 30));

// UPDATE BALANCE
balance += daily;

document.getElementById("balance").innerText =
"Balance: " + balance + " FCFA";

// SAVE HISTORY ✅
history.push({
name: name,
amount: amount,
months: months
});

// SHOW HISTORY ✅
renderHistory();

alert(
"Machine: " + name +
"\nTotal: " + Math.floor(total) +
"\nDaily: " + daily
);

localStorage.setItem("history", JSON.stringify(history));
localStorage.setItem("balance", balance);
  
}

// HISTORY 
function renderHistory(){

let html = "<h3>Investment History</h3>";

history.forEach(h=>{
html += `
<div style="background:#f9f9f9;padding:10px;margin-top:5px;border-radius:5px;">
Machine: ${h.name}<br>
Amount: ${h.amount} FCFA<br>
Duration: ${h.months} months
</div>
`;
});

document.getElementById("balance").innerHTML = "Balance: " + balance + " FCFA";

}

// WITHDRAW
function withdraw(){

let amount = prompt("Enter amount");

amount = parseInt(amount);

if(amount < 1000){
alert("Minimum withdrawal is 1000 FCFA");
return;
}

if(amount > 500000){
alert("Maximum withdrawal is 500000 FCFA");
return;
}

if(amount > balance){
alert("Insufficient balance");
return;
}

let method = prompt("Method: MTN / Orange / PayPal");

balance -= amount;

document.getElementById("balance").innerText =
"Balance: " + balance + " FCFA";

alert(
"Withdrawal successful\nAmount: "+amount+
"\nMethod: "+method+
"\nProcessing: 1-3 days"
);

localStorage.setItem("balance", balance);
  
}

// MOBILE MONEY
function momo(amount){
alert("Send "+amount+" FCFA to:\nMTN: 683397310\nOrange: 688529699");
}
  
</script>

</body>
</html>
