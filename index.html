<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{background:#0a2540;color:white;padding:20px;text-align:center}

.container{padding:20px}

.machine{background:white;margin:15px;padding:15px;border-radius:10px}

button{padding:10px;margin-top:10px;width:100%;border:none;border-radius:5px;cursor:pointer}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00}
.withdraw{background:#28a745;color:white}
.approve{background:#007bff;color:white}
.reject{background:#dc3545;color:white}

.dashboard{background:white;margin:20px;padding:20px;border-radius:10px}
.admin{background:white;margin:20px;padding:20px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div style="padding:20px;text-align:center;background:white;">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<p id="user"></p>
</div>

<header>
<h1>BuildRun</h1>
<p>Step 5 - Full System</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>

<button class="withdraw" onclick="withdraw()">Withdraw</button>

<hr>

<h3>Investment History</h3>
<div id="history"></div>

<hr>

<h3>My Withdrawals</h3>
<div id="myWithdrawals"></div>

</div>

<div class="admin">
<h2>Admin Panel</h2>
<button onclick="loadWithdrawals()">Load All Withdrawals</button>
<div id="admin"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const supabase = window.supabase.createClient(
"https://xtqhhozntvdmzcywkpbu.supabase.co",
"sb_publishable_bx3hIxUKdAYg9Le-ifq8og_iKI6DyEt"
);

let currentUser = null;
let balance = 0;

// ===== MACHINES =====
const machines = [
{name:"Mini Excavator",price:5000},
{name:"Loader",price:8000},
{name:"Bulldozer",price:20000},
{name:"Backhoe",price:25000},
{name:"Crane",price:100000},
{name:"Truck",price:120000},
{name:"Excavator",price:300000}
];

const container = document.getElementById("machines");

machines.forEach(m=>{
let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">Invest</button>
<button class="momo">MTN / Orange</button>
`;

container.appendChild(div);
});

// ===== AUTH =====
window.signUp = async function(){
let email = email.value;
let password = password.value;

const { error } = await supabase.auth.signUp({email,password});
if(error) alert(error.message);
else alert("Account created");
}

window.signIn = async function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signInWithPassword({email,password});

if(error){
alert(error.message);
}else{
currentUser = data.user;
document.getElementById("user").innerText="Logged: "+currentUser.email;
loadInvestments();
loadMyWithdrawals();
}
}

// ===== INVEST =====
window.invest = async function(name, amount){

if(!currentUser) return alert("Login first");

let months = parseInt(prompt("Duration (2-12 months)"));
if(!months || months<2 || months>12) return;

let total = amount * 1.8;
let daily = Math.floor(total/(months*30));

await supabase.from("investments").insert([{
user_email: currentUser.email,
machine: name,
amount: amount,
months: months,
daily_income: daily,
total_return: total
}]);

loadInvestments();

}

// ===== LOAD INVESTMENTS =====
async function loadInvestments(){

const { data } = await supabase
.from("investments")
.select("*")
.eq("user_email", currentUser.email);

let html="";
balance=0;

data.forEach(i=>{
balance+=i.daily_income;

html+=`<div>${i.machine} - ${i.amount} FCFA</div>`;
});

document.getElementById("history").innerHTML=html;
document.getElementById("balance").innerText="Balance: "+balance+" FCFA";

}

// ===== WITHDRAW =====
window.withdraw = async function(){

if(!currentUser) return alert("Login first");

let amount=parseInt(prompt("Amount"));
if(amount<1000 || amount>balance) return alert("Invalid");

let method=prompt("MTN / Orange / PayPal");

await supabase.from("withdrawals").insert([{
user_email: currentUser.email,
amount: amount,
method: method,
status: "pending"
}]);

alert("Withdrawal requested");
loadMyWithdrawals();

}

// ===== MY WITHDRAWALS =====
async function loadMyWithdrawals(){

const { data } = await supabase
.from("withdrawals")
.select("*")
.eq("user_email", currentUser.email);

let html="";

data.forEach(w=>{
html+=`<div>${w.amount} FCFA - ${w.method} - ${w.status}</div>`;
});

document.getElementById("myWithdrawals").innerHTML=html;

}

// ===== ADMIN =====
window.loadWithdrawals = async function(){

const { data } = await supabase.from("withdrawals").select("*");

let html="";

data.forEach(w=>{
html+=`
<div>
${w.user_email} - ${w.amount} FCFA - ${w.status}
<button class="approve" onclick="updateStatus('${w.id}','approved')">Approve</button>
<button class="reject" onclick="updateStatus('${w.id}','rejected')">Reject</button>
</div>
`;
});

document.getElementById("admin").innerHTML=html;

}

window.updateStatus = async function(id,status){

await supabase.from("withdrawals")
.update({status})
.eq("id",id);

loadWithdrawals();

}

});
</script>

</body>
</html>
