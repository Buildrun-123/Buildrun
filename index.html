<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=AXzJSzlBTtK0dHLQgK95sIFrQKbxz31Rof3fmtrTa6WtOujg61oZduwAR9WaOf5c5L6nTW7SDoHI5QSF&currency=USD"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#0a2540;color:white;padding:20px;text-align:center}
.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.machine img{
width:100%;
height:500px;
object-fit:cover;
border-radius:10px;
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00}

.dashboard{
background:white;
margin:20px;
padding:20px;
border-radius:10px
}
</style>
</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Invest in Construction Machines</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>
</div>

<script>

let balance = 0;

// ===== MACHINES (IMAGES FIXED 100%) =====
const machines = [

{
name:"Mini Excavator",
price:5000,
img:"mini.jpg"
},

{
name:"Wheel Loader",
price:8000,
img:"loader.jpg"
},

{
name:"Bulldozer",
price:20000,
img:"bulldozer.jpg"
},

{
name:"Backhoe Loader",
price:25000,
img:"backhoe.jpg"
},

{
name:"Tower Crane",
price:100000,
img:"crane.jpg"
},

{
name:"Dump Truck",
price:120000,
img:"truck.jpg"
},

{
name:"Heavy Excavator",
price:300000,
img:"excavator.jpg"
}

];
// ===== DISPLAY =====
const container = document.getElementById("machines");

machines.forEach((m, index)=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">
Invest
</button>

<button class="momo" onclick="momo(${m.price})">
Pay with MTN / Orange
</button>

<div id="paypal-${index}"></div>
`;

container.appendChild(div);

// ===== PAYPAL BUTTON =====
paypal.Buttons({
createOrder: function(data, actions){
return actions.order.create({
purchase_units:[{
amount:{value:(m.price/600).toFixed(2)}
}]
});
},
onApprove: function(data, actions){
return actions.order.capture().then(function(){
invest(m.name, m.price);
});
}
}).render(`#paypal-${index}`);

});

// ===== INVEST =====
function invest(name, amount){

let months = prompt("Enter investment duration (2 - 12 months)");

months = parseInt(months);

if(months < 2 || months > 12){
alert("Invalid duration");
return;
}

// ===== CALCULATION =====
let baseReturn = amount * 1.8; // 5000 → 9000
let extraMonths = months - 2;

// +10% per extra month
let totalReturn = baseReturn + (baseReturn * 0.1 * extraMonths);

// daily income
let days = months * 30;
let dailyIncome = Math.floor(totalReturn / days);

// ===== UPDATE BALANCE =====
balance += dailyIncome;

document.getElementById("balance").innerText =
"Balance: " + balance + " FCFA";

// ===== SHOW RESULT =====
alert(
"Machine: " + name +
"\nMonths: " + months +
"\nTotal Return: " + Math.floor(totalReturn) + " FCFA" +
"\nDaily Income: " + dailyIncome + " FCFA"
);

}

// ===== MOBILE MONEY =====
function momo(amount){
alert(
"Send " + amount + " FCFA to:\n\nMTN: 683397310\nOrange: 688529699"
);
}

</script>

</body>
</html>
