<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun TEST</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Machines TEST</p>
</header>

<div class="container" id="machines"></div>

<script>

// TEST MACHINES ONLY
const machines = [
{name:"Mini Excavator",price:5000},
{name:"Loader",price:8000},
{name:"Bulldozer",price:20000},
{name:"Crane",price:100000}
];

const container = document.getElementById("machines");

machines.forEach(m=>{
let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>
`;

container.appendChild(div);
});

</script>

</body>
</html>
