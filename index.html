<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=AXzJSzlBTtK0dHLQgK95sIFrQKbxz31Rof3fmtrTa6WtOujg61oZduwAR9WaOf5c5L6nTW7SDoHI5QSF&currency=USD"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#0a2540;color:white;padding:20px;text-align:center}
.container{padding:20px}

.machine{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.machine img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
padding:10px;
margin-top:10px;
width:100%;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00}

.dashboard{
background:white;
margin:20px;
padding:20px;
border-radius:10px
}
</style>
</head>

<body>

<header>
<h1>BuildRun</h1>
<p>Invest in Construction Machines</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>
</div>

<script>

let balance = 0;

// ===== MACHINES (IMAGES FIXED 100%) =====
const machines = [

{
name:"Mini Excavator",
price:5000,
img:"https://upload.wikimedia.org/wikipedia/commons/3/3d/Mini_excavator.jpg"
},

{
name:"Wheel Loader",
price:8000,
img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Wheel_loader.jpg"
},

{
name:"Bulldozer",
price:20000,
img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Bulldozer_D9.jpg"
},

{
name:"Backhoe Loader",
price:25000,
img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Backhoe_loader.jpg"
},

{
name:"Tower Crane",
price:100000,
img:"https://upload.wikimedia.org/wikipedia/commons/1/12/Tower_crane.jpg"
},

{
name:"Dump Truck",
price:120000,
img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Dump_truck.jpg"
},

{
name:"Heavy Excavator",
price:300000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6d/Excavator.jpg"
}

];

// ===== DISPLAY =====
const container = document.getElementById("machines");

machines.forEach((m, index)=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">
Invest
</button>

<button class="momo" onclick="momo(${m.price})">
Pay with MTN / Orange
</button>

<div id="paypal-${index}"></div>
`;

container.appendChild(div);

// ===== PAYPAL BUTTON =====
paypal.Buttons({
createOrder: function(data, actions){
return actions.order.create({
purchase_units:[{
amount:{value:(m.price/600).toFixed(2)}
}]
});
},
onApprove: function(data, actions){
return actions.order.capture().then(function(){
invest(m.name, m.price);
});
}
}).render(`#paypal-${index}`);

});

// ===== INVEST =====
function invest(name, amount){
balance += amount;
document.getElementById("balance").innerText =
"Balance: " + balance + " FCFA";

alert("Investment successful in " + name);
}

// ===== MOBILE MONEY =====
function momo(amount){
alert(
"Send " + amount + " FCFA to:\n\nMTN: 683397310\nOrange: 688529699"
);
}

</script>

</body>
</html>
