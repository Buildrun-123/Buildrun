<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuildRun</title>

<script src="https://www.paypal.com/sdk/js?client-id=AXzJSzlBTtK0dHLQgK95sIFrQKbxz31Rof3fmtrTa6WtOujg61oZduwAR9WaOf5c5L6nTW7SDoHI5QSF&currency=USD"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}

header{background:#0a2540;color:white;padding:20px;text-align:center}

.container{padding:20px}

.machine{background:white;margin:15px;padding:15px;border-radius:10px}

.machine img{width:100%;height:600px;object-fit:cover;border-radius:10px}

button{padding:12px;margin-top:10px;width:100%;border:none;border-radius:5px}

.invest{background:#0a2540;color:white}
.momo{background:#ffcc00;color:black}
.withdraw{background:#28a745;color:white}

.dashboard{background:white;margin:20px;padding:20px;border-radius:10px}

.admin{background:white;margin:20px;padding:20px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div style="padding:20px;text-align:center;background:white;">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<p id="user"></p>
</div>

<header>
<h1>BuildRun</h1>
<p>Invest in Construction Machines</p>
</header>

<div class="container" id="machines"></div>

<div class="dashboard">
<h2>Dashboard</h2>
<p id="balance">Balance: 0 FCFA</p>

<button class="withdraw" onclick="withdraw()">Withdraw</button>

<hr>

<h3>Investment History</h3>
<div id="history"></div>

</div>

<div class="admin">
<h2>Admin Panel</h2>
<button onclick="loadWithdrawals()">Load Withdrawals</button>
<div id="admin"></div>
</div>

<script>

// ===== SUPABASE =====
const supabase = window.supabase.createClient(
"https://xtqhhozntvdmzcywkpbu.supabase.co",
"sb_publishable_bx3hIxUKdAYg9Le-ifq8og_iKI6DyEt"
);

// ===== DATA =====
let history = [];
let balance = 0;
let currentUser = null;

// ===== MACHINES =====
const machines = [
{name:"Mini Excavator",price:5000,img:"mini.jpg"},
{name:"Loader",price:8000,img:"loader.jpg"},
{name:"Bulldozer",price:20000,img:"bulldozer.jpg"},
{name:"Backhoe",price:25000,img:"backhoe.jpg"},
{name:"Crane",price:100000,img:"crane.jpg"},
{name:"Truck",price:120000,img:"truck.jpg"},
{name:"Excavator",price:300000,img:"excavator.jpg"}
];

// ===== DISPLAY MACHINES =====
const container = document.getElementById("machines");

machines.forEach((m,index)=>{

let div = document.createElement("div");
div.className="machine";

div.innerHTML = `
<img src="${m.img}">
<h3>${m.name}</h3>
<p>${m.price} FCFA</p>

<button class="invest" onclick="invest('${m.name}',${m.price})">Invest</button>
<button class="momo" onclick="momo(${m.price})">MTN / Orange</button>

<div id="paypal-${index}"></div>
`;

container.appendChild(div);

// PAYPAL
paypal.Buttons({
createOrder: (data, actions)=>{
return actions.order.create({
purchase_units:[{amount:{value:(m.price/600).toFixed(2)}}]
});
},
onApprove: (data, actions)=>{
return actions.order.capture().then(()=>{
invest(m.name,m.price);
});
}
}).render(`#paypal-${index}`);

});

// ===== AUTH =====
async function signUp(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { error } = await supabase.auth.signUp({email,password});
if(error) alert(error.message);
else alert("Account created");
}

async function signIn(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

const { data, error } = await supabase.auth.signInWithPassword({email,password});

if(error){
alert(error.message);
}else{
currentUser = data.user;
document.getElementById("user").innerText="Logged: "+currentUser.email;
loadInvestments();
}
}

// ===== INVEST =====
async function invest(name, amount){

if(!currentUser){
alert("Login first");
return;
}

let months = parseInt(prompt("Duration (2-12 months)"));
if(!months || months<2 || months>12) return;

let total = amount * 1.8;
let daily = Math.floor(total/(months*30));

balance += daily;
updateBalance();

// SAVE TO SUPABASE
await supabase.from("investments").insert([{
user_email: currentUser.email,
machine: name,
amount: amount,
months: months,
daily_income: daily,
total_return: total
}]);

loadInvestments();

}

// ===== LOAD INVESTMENTS =====
async function loadInvestments(){

const { data, error } = await supabase
.from("investments")
.select("*")
.eq("user_email", currentUser.email);

if(error){
console.log(error);
return;
}

history = data;
renderHistory();

}

// ===== RENDER HISTORY =====
function renderHistory(){

let html="";
let days = 30 * h.months;
let earned = Math.floor(h.daily_income * (days / 2)); // simulation

html += `
<div>
${h.machine} <br>
Invested: ${h.amount} FCFA<br>
Estimated earnings: ${earned} FCFA
</div>
`;
history.forEach(h=>{
html+=`
<div style="background:#f9f9f9;padding:10px;margin-top:5px;">
${h.machine} - ${h.amount} FCFA - ${h.months} months
</div>`;
});

document.getElementById("history").innerHTML = html;

}

// ===== BALANCE =====
function updateBalance(){
document.getElementById("balance").innerText="Balance: "+balance+" FCFA";
}

// ===== WITHDRAW =====
async function withdraw(){

if(!currentUser){
alert("Login first");
return;
}

let amount = parseInt(prompt("Amount"));

if(amount < 1000){
alert("Minimum is 1000");
return;
}

if(amount > 500000){
alert("Max is 500000");
return;
}

if(amount > balance){
alert("Insufficient balance");
return;
}

let method = prompt("Method: MTN / Orange / PayPal");

balance -= amount;
updateBalance();

// SAVE TO SUPABASE
await supabase.from("withdrawals").insert([{
user_email: currentUser.email,
amount: amount,
method: method,
status: "pending"
}]);

alert("Withdrawal request sent (1-3 days)");

  }

// SAVE WITHDRAWAL
await supabase.from("withdrawals").insert([{
user_email: currentUser.email,
amount: amount,
method: method,
status: "pending"
}]);

alert("Withdrawal request sent (1-3 days)");

}

// ===== ADMIN =====
async function loadWithdrawals(){

const { data, error } = await supabase
.from("withdrawals")
.select("*");

if(error){
console.log(error);
return;
}

let html = "";

data.forEach(w=>{
html += `
<div style="border:1px solid #ccc;padding:10px;margin:5px;">
${w.user_email} - ${w.amount} FCFA - ${w.method} - ${w.status}
</div>
`;
});

document.getElementById("admin").innerHTML = html;

}

// ===== MOMO =====
function momo(amount){
alert("Send "+amount+" FCFA to:\nMTN: 683397310\nOrange: 688529699");
}

</script>

</body>
</html>
